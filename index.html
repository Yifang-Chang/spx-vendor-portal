<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>供應商門市招募平台</title>
<!--
  ============================================================================
  供應商門市招募平台 (Supplier Store Recruitment Platform)
  ----------------------------------------------------------------------------
  純前端單頁 HTML，可直接部署到 GitHub Pages。
  資料目前以 JavaScript Array 模擬，日後可替換為：
    - Google Sheets (透過 Apps Script Web App 當作 REST API)
    - SeaTalk Webhook (替換 sendSeaTalkNotification 內部實作)

  ★ 串接重點都已用「TODO: 串接」註解標記，搜尋 "TODO: 串接" 即可找到。
  ============================================================================
-->
<style>
  /* ====================== 基礎變數與重置 ====================== */
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --border: #e3e6ea;
    --text: #1f2733;
    --text-soft: #6b7280;
    --primary: #ee4d2d;      /* Shopee 主色 */
    --primary-dark: #d8431f;
    --primary-soft: #fff1ec;
    --sidebar: #1f2733;
    --sidebar-soft: #2c3645;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    /* 狀態色 */
    --red: #e53935;     --red-bg: #fdecea;
    --green: #2e9e5b;   --green-bg: #e7f5ed;
    --grey: #6b7280;    --grey-bg: #eef0f2;
    --yellow: #d99100;  --yellow-bg: #fff6e0;
    --orange: #e07a1f;  --orange-bg: #fff0e0;
    --blue: #2563eb;    --blue-bg: #e8f0fe;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang TC", "Microsoft JhengHei", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }
  /* ====================== 版面結構 ====================== */
  .layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 230px; background: var(--sidebar); color: #cfd6e0;
    display: flex; flex-direction: column; flex-shrink: 0;
    position: sticky; top: 0; height: 100vh;
  }
  .sidebar .brand {
    padding: 20px 18px; font-size: 16px; font-weight: 700; color: #fff;
    border-bottom: 1px solid var(--sidebar-soft); line-height: 1.3;
  }
  .sidebar .brand small { display:block; font-weight:400; font-size:11px; color:#8b97a8; margin-top:3px; }
  .nav { flex: 1; padding: 10px 0; overflow-y: auto; }
  .nav button {
    display: flex; align-items: center; gap: 10px; width: 100%;
    background: none; border: none; color: #cfd6e0; cursor: pointer;
    padding: 11px 18px; font-size: 14px; text-align: left; border-left: 3px solid transparent;
  }
  .nav button:hover { background: var(--sidebar-soft); color: #fff; }
  .nav button.active { background: var(--sidebar-soft); color: #fff; border-left-color: var(--primary); font-weight: 600; }
  .nav button .badge { margin-left: auto; background: var(--primary); color:#fff; border-radius: 10px; font-size: 11px; padding: 1px 7px; }
  .role-box { padding: 14px 18px; border-top: 1px solid var(--sidebar-soft); font-size: 12px; }
  .role-box label { color:#8b97a8; display:block; margin-bottom:5px; }
  .role-box select { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid var(--sidebar-soft); background: var(--sidebar-soft); color: #fff; }
  .role-box select option { color:#000; }

  .main { flex: 1; min-width: 0; }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 20;
  }
  .topbar h1 { font-size: 18px; }
  .topbar .who { margin-left:auto; font-size:12px; color: var(--text-soft); }
  .topbar .who b { color: var(--text); }
  .menu-toggle { display:none; background:none; border:1px solid var(--border); border-radius:6px; padding:6px 10px; cursor:pointer; font-size:16px; }
  .content { padding: 24px; max-width: 1400px; }

  /* ====================== KPI Cards ====================== */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .kpi {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; box-shadow: var(--shadow);
  }
  .kpi .label { color: var(--text-soft); font-size: 12px; margin-bottom: 6px; }
  .kpi .value { font-size: 26px; font-weight: 700; }
  .kpi.accent .value { color: var(--primary); }

  /* ====================== 篩選列 ====================== */
  .filters {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
  }
  .filters .field { display: flex; flex-direction: column; gap: 4px; }
  .filters .field label { font-size: 11px; color: var(--text-soft); }
  .filters select, .filters input {
    padding: 7px 9px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background:#fff; min-width: 120px;
  }
  .filters .reset { align-self: flex-end; }

  /* ====================== 表格 ====================== */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); overflow: hidden; margin-bottom: 18px; }
  .card .card-head { padding: 14px 18px; border-bottom: 1px solid var(--border); font-weight: 600; display:flex; align-items:center; gap:10px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 11px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { background: #fafbfc; color: var(--text-soft); font-weight: 600; font-size: 12px; position: sticky; top: 0; }
  tbody tr:hover { background: #fafbfc; }
  td.note-cell { white-space: normal; max-width: 220px; color: var(--text-soft); }
  .empty { padding: 30px; text-align: center; color: var(--text-soft); }

  /* ====================== 標籤 / Badge ====================== */
  .tag { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .tag.red { background: var(--red-bg); color: var(--red); }
  .tag.green { background: var(--green-bg); color: var(--green); }
  .tag.grey { background: var(--grey-bg); color: var(--grey); }
  .tag.yellow { background: var(--yellow-bg); color: var(--yellow); }
  .tag.orange { background: var(--orange-bg); color: var(--orange); }
  .tag.blue { background: var(--blue-bg); color: var(--blue); }
  .tag.expired { background: var(--red-bg); color: var(--red); border: 1px dashed var(--red); }

  /* ====================== 按鈕 ====================== */
  .btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 13px; color: var(--text); }
  .btn:hover { background: #f4f5f7; }
  .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
  .btn.primary:hover { background: var(--primary-dark); }
  .btn.success { background: var(--green); border-color: var(--green); color: #fff; }
  .btn.danger { background: #fff; border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red-bg); }
  .btn.sm { padding: 4px 9px; font-size: 12px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ====================== Tabs ====================== */
  .tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }
  .tabs button { padding: 8px 14px; border: 1px solid var(--border); background: #fff; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .tabs button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .tabs button .cnt { opacity:.8; }

  /* ====================== Modal ====================== */
  .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
  .modal-mask.show { display: flex; }
  .modal { background: #fff; border-radius: 12px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,.25); }
  .modal h3 { padding: 18px 20px; border-bottom: 1px solid var(--border); font-size: 16px; }
  .modal .body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .modal .field { display: flex; flex-direction: column; gap: 5px; }
  .modal .field label { font-size: 12px; color: var(--text-soft); }
  .modal .field input, .modal .field select, .modal .field textarea {
    padding: 9px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: inherit;
  }
  .modal .field input[readonly] { background: #f4f5f7; color: var(--text-soft); }
  .modal .foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  .modal .hint { font-size: 12px; color: var(--text-soft); background: var(--primary-soft); padding: 10px; border-radius: 6px; }

  /* ====================== 規則說明 ====================== */
  .rules h2 { font-size: 16px; margin: 22px 0 10px; }
  .rules h2:first-child { margin-top: 0; }
  .rules p, .rules li { color: var(--text); margin-bottom: 6px; }
  .rules ul { padding-left: 20px; }
  .rule-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px dashed var(--border); }
  .rule-item .tag { flex-shrink:0; height: fit-content; }

  /* ====================== Workflow stepper ====================== */
  .stepper { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .stepper .step { font-size:11px; padding:2px 8px; border-radius:12px; background:var(--grey-bg); color:var(--grey); }
  .stepper .step.done { background:var(--green-bg); color:var(--green); }
  .stepper .step.now { background:var(--primary); color:#fff; }
  .stepper .arrow { color:var(--text-soft); font-size:11px; }

  /* ====================== Toast ====================== */
  #toast { position: fixed; right: 20px; bottom: 20px; display:flex; flex-direction:column; gap:8px; z-index:200; }
  .toast-item { background:#1f2733; color:#fff; padding:12px 16px; border-radius:8px; font-size:13px; box-shadow:0 6px 20px rgba(0,0,0,.3); max-width:320px; white-space:pre-line; animation: slidein .2s; }
  @keyframes slidein { from { transform: translateY(10px); opacity:0; } to { transform:none; opacity:1; } }

  /* ====================== 登入畫面 ====================== */
  .login-mask { position: fixed; inset: 0; background: linear-gradient(135deg,#1f2733,#2c3645); display: flex; align-items: center; justify-content: center; z-index: 300; padding: 16px; }
  .login-mask.hide { display: none; }
  .login-box { background: #fff; border-radius: 14px; padding: 32px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
  .login-box .logo { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .login-box .sub { color: var(--text-soft); font-size: 13px; margin-bottom: 22px; }
  .login-box .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .login-box .field label { font-size: 12px; color: var(--text-soft); }
  .login-box .field input { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
  .login-box .field input:focus { outline: none; border-color: var(--primary); }
  .login-err { color: var(--red); font-size: 13px; min-height: 18px; margin-bottom: 6px; }
  .login-hint { margin-top: 18px; font-size: 11px; color: var(--text-soft); background: #f4f5f7; padding: 10px 12px; border-radius: 8px; line-height: 1.7; }
  .login-hint b { color: var(--text); }

  /* ====================== RWD ====================== */
  @media (max-width: 860px) {
    .sidebar { position: fixed; left: -240px; z-index: 50; transition: left .2s; }
    .sidebar.open { left: 0; }
    .menu-toggle { display: inline-block; }
    .content { padding: 16px; }
  }
  .page { display: none; }
  .page.active { display: block; }
</style>
</head>
<body>
<div class="layout">
  <!-- ====================== 左側 Sidebar ====================== -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">供應商門市招募平台<small>Store Recruitment Console</small></div>
    <nav class="nav" id="nav">
      <button data-page="dashboard" class="active">🏠 Dashboard 首頁</button>
      <button data-page="stores">🏬 門市招募列表</button>
      <button data-page="mine">📋 我的招募</button>
      <button data-page="review">⏳ 待審清單 <span class="badge" id="navReviewBadge">0</span></button>
      <button data-page="history">🕘 歷史紀錄</button>
      <button data-page="rules">📖 規則說明</button>
    </nav>
    <div class="role-box">
      <label>目前登入</label>
      <div id="userInfo" style="color:#fff;font-weight:600;margin:4px 0 10px;">—</div>
      <button class="btn" style="width:100%" onclick="logout()">登出</button>
    </div>
  </aside>

  <!-- ====================== 主內容 ====================== -->
  <div class="main">
    <header class="topbar">
      <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <h1 id="pageTitle">Dashboard 首頁</h1>
      <div class="who">目前身份：<b id="whoLabel"></b></div>
    </header>
    <div class="content">

      <!-- ============== 1. Dashboard ============== -->
      <section class="page active" id="page-dashboard">
        <div class="kpi-grid" id="kpiGrid"></div>
        <div class="filters" id="filters-dashboard"></div>
        <div class="card">
          <div class="card-head">門市招募狀態總覽</div>
          <div class="table-wrap"><table id="dashTable"></table></div>
        </div>
      </section>

      <!-- ============== 2. 門市招募列表 ============== -->
      <section class="page" id="page-stores">
        <div class="filters" id="filters-stores"></div>
        <div class="card">
          <div class="card-head">門市招募列表</div>
          <div class="table-wrap"><table id="storesTable"></table></div>
        </div>
      </section>

      <!-- ============== 3. 我的招募 ============== -->
      <section class="page" id="page-mine">
        <div class="card">
          <div class="card-head">我的招募 <span id="mineSupplierName" style="color:var(--text-soft);font-weight:400;"></span></div>
          <div class="table-wrap"><table id="mineTable"></table></div>
        </div>
      </section>

      <!-- ============== 4. 待審清單 (營運用) ============== -->
      <section class="page" id="page-review">
        <div class="tabs" id="reviewTabs"></div>
        <div class="card">
          <div class="card-head">待審 / 已處理申請</div>
          <div class="table-wrap"><table id="reviewTable"></table></div>
        </div>
      </section>

      <!-- ============== 5. 歷史紀錄 ============== -->
      <section class="page" id="page-history">
        <div class="card">
          <div class="card-head">歷史紀錄 (含供應商名稱，僅營運與紀錄可見)</div>
          <div class="table-wrap"><table id="historyTable"></table></div>
        </div>
      </section>

      <!-- ============== 6. 規則說明 ============== -->
      <section class="page" id="page-rules">
        <div class="card"><div class="card-head">規則說明</div>
          <div class="rules" style="padding:18px 22px;" id="rulesBody"></div>
        </div>
      </section>

    </div>
  </div>
</div>

<!-- ====================== Modal ====================== -->
<div class="modal-mask" id="modalMask">
  <div class="modal">
    <h3 id="modalTitle">標題</h3>
    <div class="body" id="modalBody"></div>
    <div class="foot">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" id="modalSubmit">送出</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<!-- ====================== 登入畫面 ====================== -->
<div class="login-mask" id="loginMask">
  <div class="login-box">
    <div class="logo">供應商門市招募平台</div>
    <div class="sub">請輸入帳號密碼登入</div>
    <div class="field"><label>帳號</label><input id="loginUser" placeholder="帳號" autocomplete="username"></div>
    <div class="field"><label>密碼</label><input id="loginPass" type="password" placeholder="密碼" autocomplete="current-password"></div>
    <div class="login-err" id="loginErr"></div>
    <button class="btn primary" id="loginBtn" style="width:100%;padding:11px;" onclick="doLogin()">登入</button>
    <div class="login-hint" id="loginHint"></div>
  </div>
</div>

<script>
/* ============================================================================
   區塊 1：常數定義（門市狀態 / 招募進度）
   ============================================================================ */

// 門市狀態定義
const STORE_STATUS = {
  urgent:   { label: '🔥 急徵',     cls: 'red',   desc: '隨時可開店，需優先招募' },
  open:     { label: '🟢 開放招募', cls: 'green', desc: '約 1 週後可開店，可開始招募' },
  planning: { label: '⚪ 規劃中',   cls: 'grey',  desc: '約 3–4 週後開店，可提前建立人才庫' },
  filled:   { label: '✅ 已補齊',   cls: 'green', desc: '招募完成，停止開放' },
};

// 招募進度定義 (stage)
const PROGRESS = {
  not_started: { label: '🟢 尚未開始',     cls: 'green',  desc: '尚無供應商開始招募，所有供應商皆可申請' },
  started:     { label: '🟡 已有供應商開始招募', cls: 'yellow', desc: '保留 7 天，逾期未更新名額自動釋出', reserveHours: 24*7 },
  confirmed:   { label: '🟠 已有供應商確認人選', cls: 'orange', desc: '帳號已建立完成，保留 48 小時等待報到程序', reserveHours: 48 },
  onboard:     { label: '🔵 已有供應商確認報到日期', cls: 'blue', desc: '暫時關閉新的招募申請；若報到取消則重新開放' },
  completed:   { label: '✅ 招募完成',     cls: 'green',  desc: '已完成招募，停止開放' },
};

// 申請動作 (action)
const ACTION = {
  apply:    '申請招募',
  start:    '開始招募',
  confirm:  '確認人選',
  onboard:  '確認報到日期',
  waitlist: '加入候補',
  release:  '逾期釋出',
  complete: '招募完成',
};

/* ============================================================================
   區塊 1-1：後端 API 設定
   ============================================================================ */
// TODO: 串接 — 部署 Apps Script Web App（設定為「以我的身分執行 / 任何人可存取」）後，
//        把產生的 /exec 網址貼到這裡。未填時前端無法登入（不再有任何前端假帳密）。
const API_URL = 'https://script.google.com/macros/s/AKfycbwDEJ1hOK7unHKLLMl0-I2BtP1MMahEDtA7dFftF5Q3om2lKRk1j6tIJwdSuh5CYZf_/exec'; // 例：'https://script.google.com/macros/s/AKfycbxxxxxxxx/exec'

/* ============================================================================
   區塊 2：模擬資料 (日後改由 Google Sheets 讀取)
   TODO: 串接 — 把以下 array 改成 fetch(APPS_SCRIPT_URL) 取得的資料
   ============================================================================ */

// 城市 → 地區 對應（篩選連動用）
const CITY_DISTRICTS = {
  '台北市': ['信義區', '內湖區', '士林區'],
  '新北市': ['板橋區', '新莊區', '三重區', '中和區'],
  '桃園市': ['桃園區', '中壢區'],
  '台中市': ['西屯區', '北屯區'],
  '高雄市': ['前鎮區', '左營區'],
};

// 供應商（至少 5 家）
let SUPPLIERS = ['宏運物流', '速達人力', '全聯運能', '台灣宅配通', '優選派遣'];

// ⚠️ 帳號密碼已不再寫死在前端，改由 Apps Script 後端驗證（見下方 API_URL 與 doLogin）。
// 帳密存放於 Google Sheet 的「Account_Master」分頁，前端完全不持有帳密清單。

// 以下四個陣列均為「前端快取」，登入後由 loadServerData() 從 Apps Script 載入並覆蓋。
// 不再內建任何假資料。
let stores = [];        // 來源：getStores（Store_Master）
let recruitments = [];  // 由 applications（已核准的申請）在前端 rebuildRecruitments() 推導
let applications = [];  // 來源：getRequests / getMyRecruitments（Recruitment_Request）
let history = [];       // 來源：getApprovalLog（Approval_Log）

// 目前登入身份：null = 尚未登入。以下皆由 Apps Script 登入回傳後設定，前端不再持有帳密。
let currentRole = null;           // 'ops' 或供應商身份（= vendor_name，沿用既有資料以 vendor_name 為 key）
let currentUser = null;           // 登入回傳的完整使用者物件
let currentVendorId = '';         // 登入者的 vendor_id（供應商才有）
let currentVendorName = '';       // 登入者的 vendor_name（供應商才有）
let reviewTab = 'all';            // 待審清單目前 tab
let idSeq = 100;                  // 流水號產生器

/* ============================================================================
   區塊 3：工具函式
   ============================================================================ */
function tsFromNow(hours){ return Date.now() + hours*3600*1000; }
function nextId(prefix){ return prefix + (++idSeq); }
function getStore(id){ return stores.find(s => s.id === id); }
function isOps(){ return currentRole === 'ops'; }
function nowStr(){
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

// 進行中家數：優先用後端聚合（供應商只拿得到自己的申請，無法自行統計全部）
function activeCount(storeId){
  const s = getStore(storeId);
  if (s && typeof s.activeCount === 'number') return s.activeCount;
  return recruitments.filter(r => r.storeId===storeId && ['started','confirmed','onboard'].includes(r.stage)).length;
}
// 候補家數：同樣優先用後端聚合
function waitlistCount(storeId){
  const s = getStore(storeId);
  if (s && typeof s.waitlistCount === 'number') return s.waitlistCount;
  const pend = applications.filter(a => a.storeId===storeId && a.action==='waitlist' && a.status==='pending').length;
  const appr = recruitments.filter(r => r.storeId===storeId && r.stage==='waitlist').length;
  return pend + appr;
}
// 取得某門市對外顯示的進度標籤（含 X 家供應商 / 候補數，不顯示名稱）
function progressLabel(store){
  const p = PROGRESS[store.stage];
  let txt = p.label;
  const n = activeCount(store.id);
  if (store.stage === 'started')    txt = `🟡 已有 ${n} 家供應商開始招募`;
  if (store.stage === 'confirmed')  txt = `🟠 已有 ${n} 家供應商確認人選`;
  if (store.stage === 'onboard')    txt = `🔵 已有供應商確認報到日期`;
  const w = waitlistCount(store.id);
  return { html:`<span class="tag ${p.cls}">${txt}</span>` + (w>0 ? ` <span class="tag grey">候補中：${w} 家</span>` : ''), cls:p.cls };
}
// 判斷某門市是否仍可「申請招募」
function canApply(store){
  if (store.status === 'filled') return false;
  // 只有「尚無供應商開始招募」(🟢 尚未開始) 時才開放申請；
  // 一旦已有供應商開始 / 確認人選 / 確認報到，其他供應商改走「加入候補」。
  return store.stage === 'not_started';
}
// 判斷是否可「加入候補」：已有人保留但尚未進入 onboard
function canWaitlist(store){
  return ['started','confirmed'].includes(store.stage);
}
// 倒數顯示 + 逾期判斷
function reserveInfo(r){
  if (!r || !r.reserveUntil) return { text:'—', expired:false };
  const diff = r.reserveUntil - Date.now();
  if (diff <= 0) return { text:'已逾期', expired:true };
  const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000);
  const d = Math.floor(h/24);
  const text = d>0 ? `剩 ${d} 天 ${h%24} 小時` : `剩 ${h} 小時 ${m} 分`;
  return { text, expired:false };
}
// 找出某供應商在某門市的招募關係
function findRec(supplier, storeId){ return recruitments.find(r => r.supplier===supplier && r.storeId===storeId); }
// 某供應商在某門市是否已有 pending 申請
function hasPending(supplier, storeId){
  return applications.some(a => a.supplier===supplier && a.storeId===storeId && a.status==='pending');
}

let filterState = { city:'', district:'', type:'', status:'', stage:'', q:'' };

function buildFilters(containerId){
  const c = document.getElementById(containerId);
  c.innerHTML = `

      <select data-f="district"><option value="">全部地區</option>${districtOptions()}</select></div>
    <div class="field"><label>門市類型</label>
      <select data-f="type"><option value="">全部類型</option><option ${filterState.type==='HD'?'selected':''}>HD</option><option ${filterState.type==='SD'?'selected':''}>SD</option></select></div>
    <div class="field"><label>門市狀態</label>
      <select data-f="status"><option value="">全部狀態</option>${Object.entries(STORE_STATUS).map(([k,v])=>`<option value="${k}" ${filterState.status===k?'selected':''}>${v.label}</option>`).join('')}</select></div>
    <div class="field"><label>招募進度</label>
      <select data-f="stage"><option value="">全部進度</option>${Object.entries(PROGRESS).map(([k,v])=>`<option value="${k}" ${filterState.stage===k?'selected':''}>${v.label}</option>`).join('')}</select></div>
    <div class="field"><label>搜尋門市名稱</label>
      <input data-f="q" placeholder="輸入門市名稱…" value="${filterState.q}"></div>
    <button class="btn reset" onclick="resetFilters()">清除篩選</button>
  `;
  c.querySelectorAll('[data-f]').forEach(el => {
    const ev = el.tagName==='INPUT' ? 'input' : 'change';
    el.addEventListener(ev, () => {
      filterState[el.dataset.f] = el.value;
      if (el.dataset.f==='city') filterState.district = ''; // 城市改變時清空地區
      renderAll();
    });
  });
}
function districtOptions(){
  const list = filterState.city ? CITY_DISTRICTS[filterState.city] : Object.values(CITY_DISTRICTS).flat();
  return list.map(d=>`<option ${filterState.district===d?'selected':''}>${d}</option>`).join('');
}
function resetFilters(){ filterState = { city:'', district:'', type:'', status:'', stage:'', q:'' }; renderAll(); }
function applyFilters(list){
  return list.filter(s =>
    (!filterState.city || s.city===filterState.city) &&
    (!filterState.district || s.district===filterState.district) &&
    (!filterState.type || s.type===filterState.type) &&
    (!filterState.status || s.status===filterState.status) &&
    (!filterState.stage || s.stage===filterState.stage) &&
    (!filterState.q || s.name.includes(filterState.q))
  );
}

   區塊 9：渲染 — 門市表格（Dashboard & 門市列表共用）
   ============================================================================ */
function storeRowActions(store){
  // 營運：可確認完成 / 釋出逾期
  if (isOps()){
    let btns = '';
    if (store.stage !== 'completed' && store.status !== 'filled')
      btns += `<button class="btn success sm" onclick="opsComplete('${store.id}')">確認完成</button>`;
    // 是否有逾期保留
    const expired = recruitments.find(r=>r.storeId===store.id && reserveInfo(r).expired && ['started','confirmed'].includes(r.stage));
    if (expired)
      btns += `<button class="btn danger sm" onclick="opsRelease('${expired.id}')">釋出逾期名額</button>`;
    return btns || '<span style="color:var(--text-soft)">—</span>';
  }
  // 供應商視角
  const rec = findRec(currentRole, store.id);
  if (rec && rec.stage!=='waitlist'){
    return `<button class="btn sm" onclick="gotoPage('mine')">前往我的招募</button>`;
  }
  if (hasPending(currentRole, store.id)){
    return `<span class="tag grey">等待審核</span>`;
  }
  let btns = '';
  if (canApply(store)) btns += `<button class="btn primary sm" onclick="openApply('${store.id}')">申請招募</button>`;
  if (canWaitlist(store)) btns += `<button class="btn sm" onclick="openWaitlist('${store.id}')">加入候補</button>`;
  return btns || '<span style="color:var(--text-soft)">已關閉</span>';
}

function renderStoreTable(tableId){
  // 排序：先看 Priority（數字越小越前面，空白＝999），同 Priority 再依門市狀態
  // 🔥 急徵 → 🟢 開放招募 → ⚪ 規劃中 → ✅ 已補齊
  const STATUS_ORDER = { urgent:0, open:1, planning:2, filled:3 };
  const rows = applyFilters(stores).slice().sort((a,b)=>
    ((a.priority??999) - (b.priority??999)) || ((STATUS_ORDER[a.status]??9) - (STATUS_ORDER[b.status]??9)));
  const head = `<thead><tr>
    <th>門市名稱</th><th>地址</th><th>城市</th><th>地區</th><th>門市類型</th><th>預估貨量</th><th>需求人數</th>
    <th>門市狀態</th><th>招募進度</th><th>預計開店日</th><th>Priority</th><th>備註</th><th>操作</th></tr></thead>`;
  const body = rows.length ? rows.map(s=>{
    const st = STORE_STATUS[s.status];
    return `<tr>

      <td class="note-cell">${s.address || '—'}</td>
      <td>${s.city}</td><td>${s.district}</td><td>${s.type}</td>
      <td>${s.volume.toLocaleString()}</td><td>${s.need}</td>
      <td><span class="tag ${st.cls}">${st.label}</span></td>
      <td>${progressLabel(s).html}</td>

      <td>${s.priority===999?'—':s.priority}</td>
      <td class="note-cell">${s.remark || '—'}</td>
      <td><div class="btn-group">${storeRowActions(s)}</div></td>
    </tr>`;
  }).join('') : `<tr><td colspan="13" class="empty">沒有符合條件的門市</td></tr>`;
  document.getElementById(tableId).innerHTML = head + `<tbody>${body}</tbody>`;
}

/* ============================================================================
   區塊 10：渲染 — 我的招募
   ============================================================================ */
const STAGE_ORDER = ['applied','started','confirmed','onboard','completed'];
const STAGE_LABEL = { applied:'申請招募', started:'開始招募', confirmed:'確認人選', onboard:'確認報到日期', completed:'招募完成' };

function stepper(currentStage){
  // currentStage 為 recruitment.stage；applied 視為 started 之前
  const idx = STAGE_ORDER.indexOf(currentStage==='waitlist' ? 'applied' : currentStage);
  return '<div class="stepper">' + STAGE_ORDER.map((s,i)=>{
    let cls = i<idx ? 'done' : (i===idx ? 'now' : '');
    return `<span class="step ${cls}">${i+1} ${STAGE_LABEL[s]}</span>` + (i<STAGE_ORDER.length-1?'<span class="arrow">→</span>':'');
  }).join('') + '</div>';
}

function mineNextAction(rec, store){
  if (rec.pendingAction){
    return `<span class="tag grey">⏳ 待審：${ACTION[rec.pendingAction]}</span>`;
  }
  const info = reserveInfo(rec);
  switch(rec.stage){
    case 'waitlist':
      return `<span class="tag grey">候補中，等待釋出</span>`;
    case 'started':
      return `<button class="btn primary sm" onclick="openConfirm('${rec.id}')">確認人選</button>`
        + (info.expired ? ` <span class="tag expired">已逾期，待營運處理</span>` : '');
    case 'confirmed':
      return `<button class="btn primary sm" onclick="openOnboard('${rec.id}')">回報報到日期</button>`
        + (info.expired ? ` <span class="tag expired">已逾期，待營運處理</span>` : '');
    case 'onboard':
      return `<span class="tag blue">等待營運確認完成</span>`;
    case 'completed':
      return `<span class="tag green">✅ 已完成</span>`;
  }
  return '—';
}

// 供應商：送出申請 / 加入候補 → 寫入 Recruitment_Request（後端通知營運）
async function submitApplication(storeId, action){
  // 供應商身份（vendor_id / vendor_name）一律取自登入回傳，前端無法竄改
  if (isOps() || !currentVendorId){ alert('請以供應商身份登入後再申請。'); return; }
  if (hasPending(currentVendorName, storeId)){ alert('此門市已有一筆待審申請，請等待營運處理。'); return; }
  const note = document.getElementById('m_note')?.value || '';
  closeModal();
  try {
    const res = await apiCall('submitRequest', {
      vendor_id: currentVendorId, vendor_name: currentVendorName,
      address: storeId, req_action: action, note   // 用 req_action 避免和 API 路由的 action 撞名
    });
    if (!res.success){ toast('⚠️ 送出失敗：' + (res.message||'')); return; }
    alert('已送出申請，營運將收到 SeaTalk 通知。');
    toast('✅ 申請已送出，狀態：待審');
    await loadServerData();
  } catch(e){ console.error(e); toast('⚠️ 無法連線，送出失敗'); }
}

// 供應商：進度回報（確認人選 / 報到日期）→ 寫入 Recruitment_Request
async function submitReport(recId, action){
  const r = recruitments.find(x=>x.id===recId); if(!r) return;
  const note = document.getElementById('m_note')?.value || '';
  const candidateCount = parseInt(document.getElementById('m_count')?.value || '0') || 0;
  const onboardDateRaw = document.getElementById('m_date')?.value || '';
  const onboardTime = document.getElementById('m_time')?.value || '';
  if (action==='onboard' && !onboardDateRaw){ alert('請選擇報到日期'); return; }
  closeModal();
  try {
    const res = await apiCall('submitRequest', {
      vendor_id: currentVendorId, vendor_name: currentVendorName,
      address: r.storeId, req_action: action, note,   // 用 req_action 避免和 API 路由的 action 撞名
      candidate_count: candidateCount,
      onboard_date: onboardDateRaw ? onboardDateRaw.replaceAll('-','/') : '',
      onboard_time: onboardTime
    });
    if (!res.success){ toast('⚠️ 送出失敗：' + (res.message||'')); return; }
    alert('已送出回報，營運將收到 SeaTalk 通知。');
    toast('✅ 進度回報已送出，狀態：待審');
    await loadServerData();
  } catch(e){ console.error(e); toast('⚠️ 無法連線，送出失敗'); }
}

// 登入：呼叫 Apps Script 後端驗證帳密 → 設定身份 → 進入系統
// 流程：前端送 ?action=login&username=&password= → 後端比對 Account_Master（且 status=Active）
//       → 回傳 { success, role, vendor_id, vendor_name, display_name }（或 success:false + message）
async function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  if (!u || !p){ errEl.textContent = '請輸入帳號與密碼。'; return; }
  if (!API_URL){ errEl.textContent = '尚未設定後端 API_URL，請先部署 Apps Script 並填入網址。'; return; }
  errEl.textContent = ''; btn.disabled = true; btn.textContent = '登入中…';
  try {
    const res = await apiLogin(u, p);          // 呼叫後端 login
    if (!res || !res.success){
      errEl.textContent = (res && res.message) ? res.message : '帳號或密碼錯誤，請重新輸入。';
      return;
    }
    // 登入成功：身份完全由後端回傳決定，前端不可自選 / 竄改
    currentUser       = res;
    currentRole       = res.role === 'ops' ? 'ops' : res.vendor_name; // 供應商以 vendor_name 當識別 key
    currentVendorId   = res.vendor_id   || '';
    currentVendorName = res.vendor_name || '';
    document.getElementById('loginPass').value = '';
    document.getElementById('userInfo').textContent =
      (res.display_name || res.vendor_name || u) + (res.role === 'ops' ? '' : '（供應商）');
    document.getElementById('loginMask').classList.add('hide');
    await loadServerData();                    // 載入門市 / 申請 / 歷史
    gotoPage('dashboard');
  } catch (e){
    console.error(e);
    errEl.textContent = '無法連線到伺服器，請稍後再試。';
  } finally {
    btn.disabled = false; btn.textContent = '登入';
  }
}

// ============================================================================
// 從後端載入資料 → 填入前端快取 → 重繪。供應商只拿自己的申請；營運拿全部 + 歷史。
// ============================================================================
async function loadServerData(){
  try {
    // 1) 門市（所有人都看得到）
    const sRes = await apiCall('getStores');
    stores = (sRes.stores || []).map(mapServerStore);

    // 2) 申請：供應商只拿自己的；營運拿全部
    const rRes = isOps()
      ? await apiCall('getRequests')
      : await apiCall('getMyRecruitments', { vendor_id: currentVendorId });
    applications = (rRes.requests || []).map(mapServerRequest);

    // 3) 歷史紀錄：僅營運讀取（供應商看不到其他供應商名稱）
    history = isOps()
      ? ((await apiCall('getApprovalLog')).logs || []).map(mapServerLog)
      : [];

    // 4) 由已核准的申請推導「進行中的招募」(recruitments)
    rebuildRecruitments();
    renderAll();
  } catch (e){
    console.error('loadServerData 失敗', e);
    toast('⚠️ 載入資料失敗，請重新整理或稍後再試');
  }
}

// ---- 後端欄位 → 前端欄位 對應 ----
function mapServerStore(s){
  return {
    id: s.address,            // 以地址作為唯一識別（前端沿用 id 變數名）
    address: s.address,
    city: s.city,
    district: s.district,
    name: s.name,
    type: s.type,
    volume: Number(s.volume) || 0,
    need: Number(s.need) || 0,
    status: s.status,
    stage: s.stage,
    openDate: s.open_date,
    remark: s.remark || '',
    priority: Number(s.priority) || 999,
    activeCount: Number(s.active_count) || 0,
    waitlistCount: Number(s.waitlist_count) || 0
  };
}
function mapServerRequest(r){
  return { id:r.request_id, time:r.request_time, supplier:r.vendor_name, vendorId:r.vendor_id,
    storeId:r.address, action:r.action,   // storeId 內容即 address
    status:(r.status||'').toLowerCase(),                 // Pending/Approved/Rejected → pending/...
    note:r.note||'', candidateCount:Number(r.candidate_count)||0,
    onboardDate:r.onboard_date||'', onboardTime:r.onboard_time||'',
    reserveUntil: r.reserve_until ? new Date(r.reserve_until).getTime() : null,
    reviewer:r.reviewer||'' };
}
function mapServerLog(l){
  const resultMap = { Approved:'核准', Rejected:'拒絕', Released:'釋出', Completed:'完成' };
  return { time:l.log_time, supplier:l.vendor_name, storeId:l.address, action:l.action,
    approved: resultMap[l.result] || l.result, reviewer:l.reviewer, note:l.note||'' };
}

// 由 applications（= Recruitment_Request）推導每家供應商在每門市的目前狀態。
// 取每個 vendor+store 最新的「已核准」動作決定 stage / 保留到期；Pending 動作標成 pendingAction。
function rebuildRecruitments(){
  const map = {}; // key = vendorId|storeId
  // 先處理已核准的，依時間排序讓較晚的覆蓋較早的
  const appr = applications.filter(a => a.status==='approved').slice()
    .sort((a,b)=> String(a.time).localeCompare(String(b.time)));
  appr.forEach(a=>{
    const key = a.vendorId + '|' + a.storeId;
    let rec = map[key] || (map[key] = { id:'rec_'+key, requestId:a.id, supplier:a.supplier,
      vendorId:a.vendorId, storeId:a.storeId, stage:'started', reserveUntil:null,
      candidateCount:0, onboardDate:'', pendingAction:null });
    rec.requestId = a.id; // 以最新核准的 request 當釋出對象
    if (a.action==='apply' || a.action==='start'){ rec.stage='started';   rec.reserveUntil=a.reserveUntil; }
    else if (a.action==='confirm'){ rec.stage='confirmed'; rec.reserveUntil=a.reserveUntil; rec.candidateCount=a.candidateCount; }
    else if (a.action==='onboard'){ rec.stage='onboard';   rec.reserveUntil=null; rec.onboardDate=a.onboardDate; }
    else if (a.action==='waitlist'){ rec.stage='waitlist'; }
    else if (a.action==='complete'){ rec.stage='completed'; rec.reserveUntil=null; }
  });
  // 再標記目前 Pending 的動作
  applications.filter(a => a.status==='pending').forEach(a=>{
    const key = a.vendorId + '|' + a.storeId;
    if (map[key]) map[key].pendingAction = a.action;
  });
  recruitments = Object.values(map);
}

// ============================================================================
// 後端 API 共用呼叫層：一律 POST，body 為 JSON { action, ... }
// 用 text/plain 當 Content-Type，屬於 CORS「簡單請求」，可避開 Apps Script 的 preflight 問題。
// ============================================================================
async function apiCall(action, payload){
  if (!API_URL) throw new Error('NO_API_URL');
  const resp = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(Object.assign({ action }, payload || {}))
  });
  return await resp.json();
}
